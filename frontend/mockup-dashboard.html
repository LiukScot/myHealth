<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health — Sidebar Mockup</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --panel: #0b0b0d;
      --card: #1f1f23;
      --card-strong: #26262b;
      --text: #f5f5f7;
      --muted: #a1a1ad;
      --border: #48484f;
      --accent: #ff5e8a;
      --accent-2: #ff8fb1;
      --danger: #ff5a7f;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.25);
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 10px;
      --space-1: 10px;
      --space-2: 20px;
      --font-body: "Manrope", system-ui, sans-serif;
      --sidebar-w: 220px;
      --sidebar-collapsed-w: 62px;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--text);
      background:
        radial-gradient(140% 120% at 20% 10%, rgba(255,94,138,0.14), transparent),
        radial-gradient(120% 100% at 80% 5%, rgba(255,143,177,0.08), transparent),
        var(--bg);
      background-attachment: fixed;
    }

    /* ── Shell ── */
    .shell {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 100vh;
      transition: grid-template-columns 0.25s ease;
    }
    .shell.collapsed {
      grid-template-columns: var(--sidebar-collapsed-w) 1fr;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 14px 10px;
      gap: 6px;
      overflow: hidden;
      transition: width 0.25s ease;
      z-index: 10;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
      min-height: 48px;
    }
    .sidebar-brand > svg { flex-shrink: 0; transition: width 0.25s ease, opacity 0.2s ease; }
    .collapsed .sidebar-brand > svg { width: 0; opacity: 0; overflow: hidden; }
    .sidebar-brand span {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      opacity: 1;
      transition: opacity 0.2s ease, flex 0.25s ease;
    }
    .collapsed .sidebar-brand span { opacity: 0; flex: 0; }

    /* Toggle button in brand row */
    .sidebar-collapse-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card-strong);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .sidebar-collapse-btn svg { width: 16px; height: 16px; }
    .sidebar-collapse-btn:hover { color: var(--text); border-color: var(--accent); }

    /* Nav items */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 10px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      overflow: hidden;
      text-transform: capitalize;
    }
    .nav-item svg { flex-shrink: 0; width: 20px; height: 20px; }
    .nav-item .nav-label {
      opacity: 1;
      transition: opacity 0.2s ease;
    }
    .collapsed .nav-item .nav-label { opacity: 0; width: 0; }

    .nav-item:hover {
      color: var(--text);
      background: var(--card-strong);
      border-color: var(--border);
    }
    .nav-item.active {
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border-color: color-mix(in srgb, var(--accent) 30%, transparent);
    }
    .nav-item:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .nav-item:disabled:hover { background: transparent; border-color: transparent; color: var(--muted); }


    /* ── Main content ── */
    .main {
      padding: 14px clamp(14px, 3vw, 40px) var(--space-2);
      max-width: 1500px;
      overflow-y: auto;
    }

    .main-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .main-header h2 { font-size: 22px; font-weight: 700; color: var(--accent); }

    /* Placeholder content */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--card);
      box-shadow: var(--shadow-sm);
    }
    .stat-card h3 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      text-transform: lowercase;
    }
    .stat-card strong { font-size: 24px; }
    .stat-card .delta {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      border: 1px solid rgba(111,225,176,0.5);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      color: #6fe1b0;
      background: rgba(111,225,176,0.09);
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .chart-placeholder {
      height: 280px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: 10px;
    }

    /* Account button top-right */
    .account-btn {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--card);
      color: var(--text);
      padding: 8px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .account-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Tooltip on collapsed icons ── */
    .nav-item-wrap { position: relative; }
    .collapsed .nav-item-wrap:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      background: var(--card-strong);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      z-index: 20;
      box-shadow: var(--shadow-sm);
      pointer-events: none;
    }

    /* ── Mobile ── */
    @media (max-width: 720px) {
      .shell {
        grid-template-columns: var(--sidebar-collapsed-w) 1fr;
      }
      .sidebar-brand span { opacity: 0; width: 0; flex: 0; }
      .nav-item .nav-label { opacity: 0; width: 0; }
      .sidebar { padding: 10px 6px; }
      .main { padding: 10px; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="shell" id="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <!-- Heart icon -->
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>Health</span>
      <button class="sidebar-collapse-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
    </div>

    <div class="nav-item-wrap" data-tooltip="Dashboard">
      <button class="nav-item active" onclick="activate(this, 'Dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span class="nav-label">Dashboard</span>
      </button>
    </div>
    <div class="nav-item-wrap" data-tooltip="Pain">
      <button class="nav-item" onclick="activate(this, 'Pain')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 10c.7-.7 1.69 0 2.5 0a2.5 2.5 0 1 0 0-5 1.5 1.5 0 0 0-1.5 1.5c0 .81.7 1.69 0 2.5L13 14l-1-1-5 5c-.7.7-1.69 0-2.5 0a2.5 2.5 0 0 0 0 5A1.5 1.5 0 0 0 6 21.5c0-.81-.7-1.69 0-2.5l5-5 1 1z"/></svg>
        <span class="nav-label">Pain</span>
      </button>
    </div>
    <div class="nav-item-wrap" data-tooltip="Diary">
      <button class="nav-item" onclick="activate(this, 'Diary')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span class="nav-label">Diary</span>
      </button>
    </div>
    <div class="nav-item-wrap" data-tooltip="CBT (coming soon)">
      <button class="nav-item" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span class="nav-label">CBT</span>
      </button>
    </div>
    <div class="nav-item-wrap" data-tooltip="DBT (coming soon)">
      <button class="nav-item" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>
        <span class="nav-label">DBT</span>
      </button>
    </div>
    <div class="nav-item-wrap" data-tooltip="Chat">
      <button class="nav-item" onclick="activate(this, 'Chat')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="nav-label">Chat</span>
      </button>
    </div>
    <div class="nav-item-wrap" data-tooltip="Settings">
      <button class="nav-item" onclick="activate(this, 'Settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span class="nav-label">Settings</span>
      </button>
    </div>

  </aside>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <h2 id="page-title">Dashboard</h2>
      <button class="account-btn">Account</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>avg mood</h3>
        <strong>7.2</strong>
        <span class="delta">+0.4</span>
      </div>
      <div class="stat-card">
        <h3>avg energy</h3>
        <strong>6.1</strong>
        <span class="delta">+0.8</span>
      </div>
      <div class="stat-card">
        <h3>avg pain</h3>
        <strong>3.4</strong>
        <span class="delta">-1.2</span>
      </div>
      <div class="stat-card">
        <h3>entries</h3>
        <strong>28</strong>
        <span class="delta">+5</span>
      </div>
    </div>

    <div class="panel">
      <h3 style="color: var(--accent); margin: 0 0 6px;">Wellbeing trend</h3>
      <div class="chart-placeholder">Chart placeholder</div>
    </div>
  </div>
</div>

<script>
  function toggleSidebar() {
    document.getElementById('shell').classList.toggle('collapsed');
  }

  function activate(btn, title) {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-title').textContent = title;
  }
</script>
</body>
</html>
