name: Auto-assign issues and PRs

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ASSIGNEE: LiukScot
    steps:
      - name: Assign issue
        if: github.event_name == 'issues'
        run: gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-assignee "$ASSIGNEE"

      - name: Assign pull request
        if: github.event_name == 'pull_request_target'
        run: gh pr edit "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --add-assignee "$ASSIGNEE"
