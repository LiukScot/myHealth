name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.x
        with:
          bun-version: 1.3.11

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend (tsc + vite)
        working-directory: frontend
        run: bun run build

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Typecheck backend
        working-directory: backend
        run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.x
        with:
          bun-version: 1.3.11

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: bun run lint

  unit:
    name: Unit (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.x
        with:
          bun-version: 1.3.11

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Run backend unit tests
        working-directory: backend
        run: bun test src/

  component:
    name: Component (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.x
        with:
          bun-version: 1.3.11

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run frontend component tests
        working-directory: frontend
        run: bunx vitest run

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.x
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install root deps
        run: bun install --frozen-lockfile

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bunx playwright test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.x

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.x
        with:
          context: .
          push: false
          tags: health:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
