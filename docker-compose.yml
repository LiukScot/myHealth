services:
  health:
    build: .
    image: health:local
    container_name: health
    network_mode: host
    mem_limit: 512m
    user: "1000:1000"
    environment:
      HOST: 0.0.0.0
      PORT: 5555
      DB_PATH: /app/data/health.sqlite
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5555,http://127.0.0.1:5555,http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
