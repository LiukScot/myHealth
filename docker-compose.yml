services:
  health:
    build: .
    image: health:local
    container_name: health
    network_mode: host
    mem_limit: 512m
    environment:
      HOST: 0.0.0.0
      PORT: 5555
      DB_PATH: /app/data/health.sqlite
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5555,http://127.0.0.1:5555,http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    develop:
      watch:
        - path: ./backend/src
          action: sync+restart
          target: /app/backend/src
        - path: ./backend/package.json
          action: rebuild

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: health-frontend
    network_mode: host
    profiles:
      - dev
    develop:
      watch:
        - path: ./frontend/src
          action: sync
          target: /app/src
        - path: ./frontend/index.html
          action: sync
          target: /app/index.html
        - path: ./frontend/public
          action: sync
          target: /app/public
        - path: ./frontend/vite.config.ts
          action: sync+restart
          target: /app/vite.config.ts
        - path: ./frontend/package.json
          action: rebuild
